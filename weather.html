<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实时天气</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .weather { 
            background: #f0f0f0; 
            padding: 20px; 
            border-radius: 10px; 
            width: 300px;
            position: relative;
        }
        #city-input { 
            margin-top: 10px; 
            padding: 5px; 
            width: 80%; 
        }
        button { 
            margin-top: 10px; 
            padding: 5px 10px; 
            cursor: pointer; 
        }
        /* 加载动画样式 */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            position: absolute;
            right: 20px;
            top: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading .loader {
            display: block;
        }
    </style>
</head>
<body>
    <div class="weather" id="weather-container">
        <div class="loader"></div>
        <h1>当前天气</h1>
        <div id="weather-data">正在获取您的位置...</div>
        <input type="text" id="city-input" 
               placeholder="输入城市（如：北京）"
               onkeypress="handleEnterKey(event)">
        <button onclick="getWeatherByCity()">查询天气</button>
    </div>

    <script>
        const QWEATHER_KEY = "d6a480091f2249fbb54ed3f04a4f1d74";

        // 新增回车处理函数
        function handleEnterKey(event) {
            if (event.key === "Enter") {
                getWeatherByCity();
                event.preventDefault();
            }
        }

        // 显示/隐藏加载动画
        function toggleLoading(show) {
            const container = document.getElementById('weather-container');
            container.classList.toggle('loading', show);
        }

        // 获取天气数据（新增城市名称参数）
        async function getWeather(locationId, cityName) {
            toggleLoading(true);
            const weatherDiv = document.getElementById('weather-data');
            
            try {
                // 获取天气信息
                const weatherRes = await fetch(
                    `https://devapi.qweather.com/v7/weather/now?location=${locationId}&key=${QWEATHER_KEY}&lang=zh`
                );
                const weatherData = await weatherRes.json();
                
                // 获取城市详细信息
                const cityRes = await fetch(
                    `https://geoapi.qweather.com/v2/city/lookup?location=${locationId}&key=${QWEATHER_KEY}`
                );
                const cityData = await cityRes.json();

                if(weatherData.code === "200" && cityData.code === "200") {
                    const weatherInfo = weatherData.now;
                    const fullCityName = `${cityData.location[0].country}·${cityData.location[0].adm1}·${cityData.location[0].name}`;
                    
                    weatherDiv.innerHTML = `
                        <p>城市：${fullCityName}</p>
                        <p>温度：${weatherInfo.temp}°C</p>
                        <p>体感：${weatherInfo.feelsLike}°C</p>
                        <p>天气：${weatherInfo.text}</p>
                        <p>湿度：${weatherInfo.humidity}%</p>
                        <p>风速：${weatherInfo.windSpeed}公里/小时</p>
                    `;
                } else {
                    throw new Error(weatherData.message || cityData.message);
                }
            } catch (error) {
                console.error("获取天气失败:", error);
                weatherDiv.innerHTML = `错误：${error.message}`;
            } finally {
                toggleLoading(false);
            }
        }

        // 通过城市名称获取LocationID（返回对象包含ID和城市信息）
        async function getLocationId(city) {
            try {
                const response = await fetch(
                    `https://geoapi.qweather.com/v2/city/lookup?location=${city}&key=${QWEATHER_KEY}`
                );
                const data = await response.json();
                
                if(data.code === "200" && data.location.length > 0) {
                    return {
                        id: data.location[0].id,
                        name: data.location[0].name
                    };
                }
                throw new Error("城市未找到");
            } catch (error) {
                console.error("获取LocationID失败:", error);
                throw error;
            }
        }

        // 手动输入城市查询
        async function getWeatherByCity() {
            const city = document.getElementById('city-input').value.trim();
            if (!city) {
                document.getElementById('weather-data').innerHTML = "请输入有效城市名称";
                return;
            }
            
            try {
                const locationInfo = await getLocationId(city);
                await getWeather(locationInfo.id, locationInfo.name);
            } catch (error) {
                document.getElementById('weather-data').innerHTML = "城市输入有误，请尝试「北京」或「海淀」等名称";
            }
        }

        // 自动定位功能
        async function getLocation() {
            if (!navigator.geolocation) {
                document.getElementById('weather-data').innerHTML = "浏览器不支持地理定位";
                return;
            }

            navigator.geolocation.getCurrentPosition(async position => {
                try {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // 获取位置信息
                    const response = await fetch(
                        `https://geoapi.qweather.com/v2/city/lookup?location=${lon},${lat}&key=${QWEATHER_KEY}`
                    );
                    const data = await response.json();
                    
                    if(data.code === "200" && data.location.length > 0) {
                        const location = data.location[0];
                        await getWeather(location.id, location.name);
                    } else {
                        throw new Error("定位城市失败");
                    }
                } catch (error) {
                    console.error("定位失败:", error);
                    document.getElementById('weather-data').innerHTML = "自动定位失败，请手动输入城市";
                }
            }, error => {
                console.error("用户拒绝定位:", error);
                document.getElementById('weather-data').innerHTML = "定位权限被拒绝，请手动输入城市";
            });
        }

        window.onload = getLocation;
    </script>
</body>
</html>
