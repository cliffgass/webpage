<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实时天气</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .weather { background: #f0f0f0; padding: 20px; border-radius: 10px; width: 300px; }
        #city-input { margin-top: 10px; padding: 5px; width: 80%; }
        button { margin-top: 10px; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="weather">
        <h1>当前天气</h1>
        <div id="weather-data">正在获取您的位置...</div>
        <input type="text" id="city-input" placeholder="手动输入城市（如：北京市）">
        <button onclick="getWeatherByCity()">查询天气</button>
    </div>

    <script>
        const API_KEY = "8321f900611d373f58039530b8a1a9ae";

        // 通过 OpenWeather API 规范化城市名称
        async function normalizeCityName(city) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/geo/1.0/direct?q=${city},CN&limit=1&appid=${API_KEY}`
                );
                const data = await response.json();
                if (data.length > 0) {
                    console.log("标准化城市名称:", data[0].name);
                    return data[0].name; // 返回 API 认可的城市名称
                }
            } catch (error) {
                console.error("获取标准化城市名失败:", error);
            }
            return city; // 如果无法获取，仍然使用原输入
        }

        async function getWeather(city) {
            const weatherDiv = document.getElementById('weather-data');
            weatherDiv.innerHTML = "正在加载天气数据...";
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=zh_cn`
                );
                if (!response.ok) throw new Error(`查询失败: ${response.status}`);
                const data = await response.json();
                weatherDiv.innerHTML = `
                    <p>城市：${data.name}</p>
                    <p>温度：${data.main.temp}°C</p>
                    <p>体感温度：${data.main.feels_like}°C</p>
                    <p>天气：${data.weather[0].description}</p>
                    <p>湿度：${data.main.humidity}%</p>
                    <p>风速：${data.wind.speed} m/s</p>
                `;
            } catch (error) {
                console.error("获取天气失败:", error);
                weatherDiv.innerHTML = "天气数据加载失败，请检查城市名称";
            }
        }

        // 手动输入城市查询天气
        async function getWeatherByCity() {
            let city = document.getElementById('city-input').value.trim();
            if (!city) return;

            city = await normalizeCityName(city); // 先转换为 API 认可的名称
            getWeather(city);
        }

        // 页面加载时自动定位
        async function getLocation() {
            if (!navigator.geolocation) {
                document.getElementById('weather-data').innerHTML = "浏览器不支持地理定位";
                return;
            }
            navigator.geolocation.getCurrentPosition(async position => {
                try {
                    const { latitude: lat, longitude: lon } = position.coords;
                    const response = await fetch(
                        `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`
                    );
                    const data = await response.json();

                    console.log("反向地理编码数据:", data);

	                if (data.length > 0) {
        	            let city = data[0].name; // 可能是区或县
                	    let state = data[0].state || ""; // 省级信息
                      	    let country = data[0].country || "CN"; // 国家

                    	   console.log("使用的城市名称:", city);
                    	   getWeather(city); // 继续查询天气
                	} else {
                    		throw new Error("无法解析城市名称");
                	}
                } catch (error) {
                    console.error("获取城市失败:", error);
                    document.getElementById('weather-data').innerHTML = "城市获取失败，请手动输入";
                }
            }, error => {
                console.error("定位失败:", error);
                document.getElementById('weather-data').innerHTML = "自动定位失败，请手动输入城市";
            });
        }

        window.onload = getLocation;
    </script>
</body>
</html>
